<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化整為靈：終極大挑戰</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: #e0e0e0;
    overflow-x: hidden;
  }

  .particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(255,215,0,0.3);
    border-radius: 50%;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    padding-bottom: 60px;
  }

  .start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 90vh;
    text-align: center;
    animation: fadeIn 1s ease;
  }

  .start-screen h1 {
    font-size: 2.4em;
    font-weight: 900;
    background: linear-gradient(to right, #f7971e, #ffd200, #f7971e);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
    margin-bottom: 10px;
  }

  .start-screen .subtitle {
    font-size: 1.05em;
    color: #aaa;
    margin-bottom: 30px;
    line-height: 1.9;
  }

  .start-screen .emoji-row {
    font-size: 2.5em;
    margin-bottom: 30px;
    animation: bounce 2s infinite;
  }

  .start-screen .feature-tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 30px;
  }

  .feature-tag {
    padding: 6px 14px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    font-size: 0.85em;
    color: #ccc;
  }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  @keyframes confettiFall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,215,0,0.3); }
    50% { box-shadow: 0 0 20px 5px rgba(255,215,0,0.15); }
  }

  .btn-start {
    padding: 16px 50px;
    font-size: 1.2em;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #1a1a2e;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 25px rgba(247,151,30,0.4);
    animation: pulse 2s infinite;
  }

  .btn-start:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 35px rgba(247,151,30,0.6);
  }

  .mode-select {
    display: flex;
    gap: 12px;
    margin-bottom: 25px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mode-btn {
    padding: 12px 22px;
    font-size: 0.95em;
    font-weight: 700;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    color: #ccc;
    cursor: pointer;
    transition: all 0.3s;
  }

  .mode-btn:hover, .mode-btn.active {
    border-color: #ffd200;
    color: #ffd200;
    background: rgba(255,215,0,0.1);
  }

  .progress-area { margin-bottom: 25px; }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.9em;
    color: #aaa;
    flex-wrap: wrap;
    gap: 5px;
  }

  .progress-bar {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, #f7971e, #ffd200);
    border-radius: 10px;
    transition: width 0.5s ease;
  }

  .question-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 20px;
    animation: pop 0.5s ease;
  }

  .question-badge {
    display: inline-block;
    padding: 4px 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 20px;
    font-size: 0.8em;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .element-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75em;
    font-weight: 700;
    margin-left: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #ccc;
  }

  .difficulty-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75em;
    font-weight: 700;
    margin-left: 6px;
  }

  .diff-hard { background: linear-gradient(135deg, #f5576c, #ff6b6b); }
  .diff-expert { background: linear-gradient(135deg, #a855f7, #6d28d9); }
  .diff-nightmare { background: linear-gradient(135deg, #dc2626, #7f1d1d); }

  .question-text {
    font-size: 1.12em;
    font-weight: 700;
    line-height: 1.8;
    margin-bottom: 22px;
    color: #f0f0f0;
  }

  .question-scenario {
    background: rgba(255,255,255,0.04);
    border-left: 4px solid #ffd200;
    padding: 14px 18px;
    border-radius: 0 12px 12px 0;
    margin-bottom: 20px;
    font-size: 0.93em;
    line-height: 1.85;
    color: #ccc;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 15px 16px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: left;
    font-size: 0.93em;
    line-height: 1.7;
    color: #ddd;
  }

  .option-btn:hover:not(.disabled) {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,215,0,0.4);
    transform: translateX(5px);
  }

  .option-btn .option-letter {
    flex-shrink: 0;
    width: 30px; height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    font-weight: 900;
    font-size: 0.85em;
    color: #ffd200;
    margin-top: 2px;
  }

  .option-btn.correct {
    background: rgba(34,197,94,0.15);
    border-color: #22c55e;
    animation: pop 0.4s ease;
  }
  .option-btn.correct .option-letter {
    background: #22c55e; color: #fff;
  }

  .option-btn.wrong {
    background: rgba(239,68,68,0.15);
    border-color: #ef4444;
    animation: shake 0.5s ease;
  }
  .option-btn.wrong .option-letter {
    background: #ef4444; color: #fff;
  }

  .option-btn.disabled {
    cursor: default; opacity: 0.55;
  }
  .option-btn.disabled.correct { opacity: 1; }

  .explanation {
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 14px;
    animation: slideIn 0.4s ease;
    line-height: 1.85;
    font-size: 0.93em;
  }

  .explanation.correct-exp {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.3);
  }

  .explanation.wrong-exp {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
  }

  .explanation h4 { margin-bottom: 8px; font-size: 1em; }

  .element-reveal {
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(102,126,234,0.12);
    border-radius: 10px;
    font-size: 0.88em;
    color: #a5b4fc;
    line-height: 1.6;
  }

  .btn-next {
    display: block;
    margin: 18px auto 0;
    padding: 14px 40px;
    font-size: 1em;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(102,126,234,0.4);
  }

  .btn-next:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(102,126,234,0.6);
  }

  .score-display {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.95em;
    font-weight: 700;
    color: #ffd200;
  }

  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    background: linear-gradient(135deg, #f97316, #ef4444);
    border-radius: 20px;
    font-size: 0.78em;
    font-weight: 700;
    animation: pop 0.3s ease;
    margin-left: 8px;
    color: #fff;
  }

  .timer-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin-top: 14px;
    overflow: hidden;
  }

  .timer-fill {
    height: 100%;
    background: linear-gradient(to right, #22c55e, #ffd200, #ef4444);
    border-radius: 4px;
    transition: width 0.1s linear;
  }

  /* Result */
  .result-screen {
    text-align: center;
    padding: 35px 20px;
    animation: fadeIn 0.8s ease;
  }

  .result-screen .big-emoji {
    font-size: 4.5em;
    margin-bottom: 18px;
    animation: bounce 1.5s infinite;
  }

  .result-screen h2 {
    font-size: 1.8em;
    font-weight: 900;
    margin-bottom: 8px;
    background: linear-gradient(to right, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .result-screen .score-final {
    font-size: 3.2em;
    font-weight: 900;
    color: #ffd200;
    margin: 18px 0;
  }

  .result-screen .message {
    font-size: 1.05em;
    line-height: 1.85;
    color: #bbb;
    margin-bottom: 25px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }

  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 22px 0;
    flex-wrap: wrap;
  }

  .result-stat {
    background: rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 18px 24px;
    text-align: center;
    min-width: 100px;
  }

  .result-stat .stat-num {
    font-size: 1.8em;
    font-weight: 900;
  }

  .result-stat .stat-label {
    font-size: 0.82em;
    color: #aaa;
    margin-top: 4px;
  }

  .stat-correct .stat-num { color: #22c55e; }
  .stat-wrong .stat-num { color: #ef4444; }
  .stat-percent .stat-num { color: #ffd200; }

  .element-summary {
    margin: 25px auto;
    max-width: 520px;
    text-align: left;
  }

  .element-summary h3 {
    text-align: center;
    font-size: 1.1em;
    margin-bottom: 14px;
    color: #ffd200;
  }

  .elem-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    margin-bottom: 6px;
    font-size: 0.88em;
  }

  .elem-icon { font-size: 1.3em; flex-shrink: 0; }
  .elem-name { flex: 1; font-weight: 600; }
  .elem-score { font-weight: 900; }
  .elem-score.good { color: #22c55e; }
  .elem-score.mid { color: #ffd200; }
  .elem-score.bad { color: #ef4444; }

  .btn-restart {
    padding: 16px 50px;
    font-size: 1.1em;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #1a1a2e;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 25px rgba(247,151,30,0.4);
    margin-top: 10px;
  }

  .btn-restart:hover {
    transform: translateY(-3px) scale(1.05);
  }

  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    z-index: 100;
    pointer-events: none;
  }

  .quote-box {
    margin-top: 20px;
    padding: 16px;
    background: rgba(255,215,0,0.06);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 14px;
    font-size: 0.95em;
    line-height: 1.7;
    color: #ffd200;
    text-align: center;
  }

  @media (max-width: 600px) {
    .start-screen h1 { font-size: 1.5em; }
    .question-card { padding: 18px; }
    .question-text { font-size: 0.98em; }
    .option-btn { font-size: 0.86em; padding: 12px 13px; }
    .result-screen .score-final { font-size: 2.3em; }
    .result-stat { padding: 14px 16px; min-width: 85px; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="container" id="app"></div>

<script>
const questions = [
  // === 相愛關係 ===
  {
    scenario: "教會植堂團隊正在討論新堂點的異象。有人建議先做社區人口分析、消費力調查，再決定「產品定位」。另一位同工卻說：「我們連自己是什麼都還沒搞清楚。」",
    question: "根據課程對 Ecclesia 的定義，這位同工的擔憂最可能指向什麼核心問題？",
    options: [
      "擔心新堂點的財務預算不足以支撐長期營運",
      "質疑團隊尚未釐清『教會是被呼召出來的生命有機體』這個根本身份，就急著用市場邏輯來定位",
      "認為應該先完成宗派總會的行政審批流程再談異象",
      "主張應先確定建築風格是哥德式還是現代式，因為教會的外觀決定了她的本質"
    ],
    correct: 1,
    difficulty: "hard",
    element: "相愛關係",
    explanation: "Ecclesia 意指『被呼召出來的一班人』，是活的有機體而非商業機構。若團隊在尚未認清這個身份前就以市場邏輯定位，便已落入『堂會有限公司』的陷阱。"
  },
  {
    scenario: "某教會推行「關懷卡」制度：每位會友每月需填寫三張關懷卡寄給其他會友。年底統計顯示共發出12,000張卡片，牧師在年報中驕傲地宣告：「我們是一間充滿愛的教會！」",
    question: "根據「相愛關係」要素中「在行為和誠實上實踐彼此相愛」的原則，這個宣告最大的盲點是什麼？",
    options: [
      "12,000張不夠多，應該設定更高的KPI才能展現愛的深度",
      "關懷卡是很好的制度，但應該同時搭配電子郵件和社群媒體問候以提升覆蓋率",
      "把「愛」量化為可計數的卡片數量，可能用制度化的動作取代了真實生命中有血有肉的相愛，12,000張卡片不等於12,000次真正的相遇",
      "牧師不該在年報中提這件事，因為做善事不應該張揚"
    ],
    correct: 2,
    difficulty: "expert",
    element: "相愛關係",
    explanation: "「相愛關係」要求的是在「行為和誠實」中的真實彼此相愛，視彼此為一家人。當愛被KPI化，它就從生命的自然流露變成了可統計的績效指標。真正的關懷不在於卡片的數量，而在於生命是否真的交織在一起。"
  },
  {
    scenario: "兩位會友因事工方向起了嚴重衝突。一方主張直接處理，另一方認為「基督徒不該起衝突」就迴避了。三個月後，兩人表面和平但私下互不來往，小組氣氛也變得詭異地客氣。",
    question: "從「相愛關係」的角度，這個「和平」的真正問題是什麼？",
    options: [
      "衝突已經解決了，雙方都選擇了寬容和忍耐，這正是基督徒的美德",
      "應該請牧師在主日講道中公開點名批評不願和解的一方",
      "這種迴避衝突的『假和平』恰恰是關係的反面——真正的「一家人」關係包含在安全中處理張力的能力，虛假的客氣比公開的衝突更能腐蝕群體",
      "教會本來就不是處理人際衝突的場所，應該建議他們去找專業心理諮商師"
    ],
    correct: 2,
    difficulty: "hard",
    element: "相愛關係",
    explanation: "「相愛關係」的核心是「視彼此為一家人」。家人之間的愛不是不吵架，而是吵完了還願意一起吃飯。虛假的表面和平破壞了群體的真實性，比衝突本身更危險，因為它讓每個人都開始戴上面具。"
  },

  // === 全民參與 ===
  {
    scenario: "一位資深長老在同工退修會上引用《尼西亞信經》，強調教會的四個標記。年輕傳道人小張追問：「如果我們是『大公的』，為何我們總是只關心自己堂會的出席率？」",
    question: "小張的提問最深層的神學張力是什麼？",
    options: [
      "他在暗示教會應該合併以節省資源，減少宗派數量",
      "他在質疑教會的『一體性』與『大公性』標記，與堂會實際運作中的『有限公司』自保心態之間的矛盾",
      "他不尊重長老的權柄，想用神學術語挑戰教會的階級制度",
      "他認為出席率統計本身就是不屬靈的行為，教會不應該有任何數據管理"
    ],
    correct: 1,
    difficulty: "expert",
    element: "全民參與",
    explanation: "《尼西亞信經》宣告教會是『一體的、聖潔的、大公的、傳承自使徒的』。當堂會只關心自身出席率時，實質上違背了『大公性』。小張的提問直指堂會『有限公司化』後的自我中心傾向。"
  },
  {
    scenario: "恩典堂的主任牧師是一位魅力型領袖，講道精彩、行政能力超強。整間教會上下都以他為核心運轉。有天他因病需休養三個月，整間教會立刻陷入癱瘓：沒人知道怎麼帶敬拜、誰來探訪、事工如何推進。",
    question: "這個「癱瘓現象」最精準地暴露了哪個要素的缺失？",

function shuffleArray(arr) {
  const shuffled = [...arr];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

// Reduce answer-length bias by padding some distractors when the correct option is obviously longest.
function balanceOptionLengths(question) {
  const cloned = { ...question, options: [...question.options] };
  const lengths = cloned.options.map((opt) => opt.length);
  const correctIdx = cloned.correct;
  const correctLen = lengths[correctIdx];

  const ranked = lengths
    .map((len, idx) => ({ idx, len }))
    .sort((a, b) => b.len - a.len);

  const isCorrectLongest = ranked[0].idx === correctIdx;
  const secondLongestLen = ranked[1] ? ranked[1].len : 0;

  if (!isCorrectLongest || correctLen - secondLongestLen < 6) {
    return cloned;
  }

  const decoySuffixes = [
    '，並強調流程控管與可複製性。',
    '，這樣看起來也更符合一般管理直覺。',
    '，同時兼顧制度穩定與執行效率。',
    '，以確保團隊能持續追蹤與優化。',
    '，並透過明確機制提升落地成效。',
    '，讓整體運作更容易被衡量與管理。'
  ];

  const distractors = lengths
    .map((len, idx) => ({ idx, len }))
    .filter((item) => item.idx !== correctIdx)
    .sort((a, b) => a.len - b.len);

  const targetLen = Math.max(correctLen - 4, secondLongestLen + 2);
  let suffixCursor = Math.floor(Math.random() * decoySuffixes.length);

  distractors.forEach((item) => {
    while (cloned.options[item.idx].length < targetLen) {
      const suffix = decoySuffixes[suffixCursor % decoySuffixes.length];
      suffixCursor++;
      cloned.options[item.idx] += suffix;
      if (cloned.options[item.idx].length >= targetLen) break;
    }
  });

  return cloned;
}

function buildQuizSet(count) {
  return shuffleArray(questions)
    .slice(0, count)
    .map((q) => balanceOptionLengths(q));
}

  shuffledQuestions = buildQuizSet(questionCount);

  };
  return map[el] || '📌';
}

function showQuestion() {
  answered = false;
  const q = shuffledQuestions[currentQuestion];
  const indices = [0, 1, 2, 3];
  optionMapping = shuffleArray(indices);

  const diffLabel = q.difficulty === 'hard' ? '🔥 困難' : q.difficulty === 'expert' ? '💀 專家級' : '☠️ 噩夢級';
  const diffClass = q.difficulty === 'hard' ? 'diff-hard' : q.difficulty === 'expert' ? 'diff-expert' : 'diff-nightmare';
  const letters = ['A', 'B', 'C', 'D'];

  let optionsHtml = '';
  optionMapping.forEach((origIdx, displayIdx) => {
    optionsHtml += `
      <button class="option-btn" id="opt-${displayIdx}" onclick="selectAnswer(${displayIdx}, ${origIdx})">
        <span class="option-letter">${letters[displayIdx]}</span>
        <span>${q.options[origIdx]}</span>
      </button>
    `;
  });

  const activeTimer = timerModeConfig[timerMode] || timerModeConfig.normal;
  const showTimer = !activeTimer.untimed;

  app.innerHTML = `
    <div class="progress-area">
      <div class="progress-info">
        <span>第 ${currentQuestion + 1} / ${shuffledQuestions.length} 題</span>
        <div class="score-display">
          ✨ ${score} 分
          ${streak >= 2 ? `<span class="streak-badge">🔥 ×${streak}</span>` : ''}
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${((currentQuestion) / shuffledQuestions.length) * 100}%"></div>
      </div>
    </div>
    <div class="question-card">
      <span class="question-badge">情境題</span>
      <span class="element-badge">${getElementEmoji(q.element)} ${q.element}</span>
      <span class="difficulty-badge ${diffClass}">${diffLabel}</span>
      <div class="question-scenario">${q.scenario}</div>
      <div class="question-text">${q.question}</div>
      <div class="options-list">${optionsHtml}</div>
      ${showTimer ? '<div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>' : ''}
      <div id="explanationArea"></div>
      <div id="nextArea"></div>
    </div>
  `;

  clearInterval(timerInterval);
  if (!showTimer) {
    timeLeft = null;
    return;
  }

  timeLeft = 100;
  timerInterval = setInterval(() => {
    if (answered) { clearInterval(timerInterval); return; }
    timeLeft -= activeTimer.drainPerTick;
    const fill = document.getElementById('timerFill');
    if (fill) fill.style.width = Math.max(0, timeLeft) + '%';
    if (timeLeft <= 0) { clearInterval(timerInterval); autoTimeout(); }
  }, activeTimer.tickMs);
}

function autoTimeout() {
  if (answered) return;
  answered = true;
  streak = 0;
  const q = shuffledQuestions[currentQuestion];
  trackElement(q.element, false);

  document.querySelectorAll('.option-btn').forEach((btn, idx) => {
    btn.classList.add('disabled');
    if (optionMapping[idx] === q.correct) btn.classList.add('correct');
  });

  document.getElementById('explanationArea').innerHTML = `
    <div class="explanation wrong-exp">
      <h4>⏰ 時間到！</h4>
      <p>${q.explanation}</p>
      <div class="element-reveal">📌 本題考核要素：<strong>${q.element}</strong></div>
    </div>
  `;
  showNextBtn();
}

function trackElement(el, correct) {
  if (!elementStats[el]) elementStats[el] = { total: 0, correct: 0 };
  elementStats[el].total++;
  if (correct) elementStats[el].correct++;
}

function selectAnswer(displayIdx, origIdx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const q = shuffledQuestions[currentQuestion];
  const isCorrect = origIdx === q.correct;

  trackElement(q.element, isCorrect);

  if (isCorrect) {
    const activeTimer = timerModeConfig[timerMode] || timerModeConfig.normal;
    const bonus = activeTimer.untimed ? 10 : (timeLeft > 60 ? 15 : timeLeft > 30 ? 10 : 5);
    score += bonus;
    streak++;
    correctCount++;
    if (streak > maxStreak) maxStreak = streak;
  } else {
    streak = 0;
  }

  document.querySelectorAll('.option-btn').forEach((btn, idx) => {
    btn.classList.add('disabled');
    if (optionMapping[idx] === q.correct) btn.classList.add('correct');
  });

  if (!isCorrect) {
    document.getElementById(`opt-${displayIdx}`).classList.add('wrong');
  }

  const expClass = isCorrect ? 'correct-exp' : 'wrong-exp';
  const expIcon = isCorrect ? '✅ 答對了！' : '❌ 可惜答錯了！';

  document.getElementById('explanationArea').innerHTML = `
    <div class="explanation ${expClass}">
      <h4>${expIcon}${isCorrect && timeLeft > 60 ? ' ⚡ 速度加分！' : ''}</h4>
      <p>${q.explanation}</p>
      <div class="element-reveal">📌 本題考核要素：<strong>${q.element}</strong></div>
    </div>
  `;
  showNextBtn();
}

function showNextBtn() {
  document.getElementById('nextArea').innerHTML = `

      ${currentQuestion < shuffledQuestions.length - 1 ? '下一題 →' : '查看成績 🎯'}

}

    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
}

function showResult() {
  const total = shuffledQuestions.length;
  const maxScore = total * 15;
  const pct = Math.round((score / maxScore) * 100);
  const wrongCount = total - correctCount;

  let emoji, title, msg;
  if (pct >= 80) {
    emoji = '🏆'; title = '神國故事的資深門徒！';
    msg = '你已深刻理解「從堂會走進神國故事」的轉化之道。願你的手指永遠指向基督！';
    launchConfetti();
  } else if (pct >= 55) {
    emoji = '🌟'; title = '正在覺醒的領袖！';
    msg = '你已經開始看見「有限公司」思維的陷阱，但某些偽裝成合理的選項仍然騙到了你。';
  } else if (pct >= 30) {
    emoji = '🌱'; title = '破土而出的小苗！';
    msg = '轉化之旅剛剛開始。讓「有機體 vs 有限公司」的張力在心中紮根，重新思考七個基本要素。';
  } else {
    emoji = '📖'; title = '重新出發的旅人！';
    msg = '別灰心！施洗約翰的手指還在等你。回到教材中，讓福音故事重新點燃你的想像力。';
  }

  // Build element stats
  const elemEmojis = {'相愛關係':'💛','全民參與':'👥','加力門訓':'💪','聚焦基督':'✝️','外展繁殖':'🌍','重視網絡':'🔗','靈活架構':'⚙️'};
  let elemHtml = '';
  for (const [el, stats] of Object.entries(elementStats)) {
    const epct = Math.round((stats.correct / stats.total) * 100);
    const cls = epct >= 70 ? 'good' : epct >= 40 ? 'mid' : 'bad';
    elemHtml += `
      <div class="elem-row">
        <span class="elem-icon">${elemEmojis[el] || '📌'}</span>
        <span class="elem-name">${el}</span>
        <span class="elem-score ${cls}">${stats.correct}/${stats.total}</span>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="result-screen">
      <div class="big-emoji">${emoji}</div>
      <h2>${title}</h2>
      <div class="score-final">${score} 分</div>
      <div class="result-breakdown">
        <div class="result-stat stat-percent">
          <div class="stat-num">${pct}%</div>
          <div class="stat-label">得分率</div>
        </div>
        <div class="result-stat stat-correct">
          <div class="stat-num">${correctCount}</div>
          <div class="stat-label">答對</div>
        </div>
        <div class="result-stat stat-wrong">
          <div class="stat-num">${wrongCount}</div>
          <div class="stat-label">答錯</div>
        </div>
        <div class="result-stat">
          <div class="stat-num" style="color:#f97316;">🔥 ${maxStreak}</div>
          <div class="stat-label">最高連續</div>
        </div>
      </div>
      <div class="element-summary">
        <h3>七大要素成績分析</h3>
        ${elemHtml}
      </div>
      <p class="message">${msg}</p>
      <div class="quote-box">
        「教會的任務就是成為施洗約翰的手指，<br>始終如一地指向那位拯救世界的耶穌基督。」
      </div>
      <br>
      <button class="btn-restart" onclick="showStart()">重新挑戰 🔄</button>
    </div>
  `;
}

createParticles();
showStart();
</script>
</body>
</html>
