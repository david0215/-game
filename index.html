<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>門徒領袖培訓：隨機挑戰測驗 (30題版)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .quiz-info { text-align: center; color: #7f8c8d; margin-bottom: 20px; font-size: 0.9em; }
        .question { margin-bottom: 25px; padding: 15px; border-left: 5px solid #3498db; background: #f9fbfd; border-radius: 0 8px 8px 0; }
        .options label { display: block; margin-bottom: 8px; cursor: pointer; padding: 5px; }
        .options label:hover { background: #eef7ff; }
        button { display: block; width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #2980b9; }
        #result { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; background: #e8f8f5; white-space: pre-wrap; border: 1px solid #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h1>化整為零：領袖培訓隨機挑戰</h1>
    <p class="quiz-info">（每次重新整理，都會從 30 題庫中隨機抽出 10 題進行測試）</p>
    <p class="quiz-info">想挑戰進階版？<a href="hard.html">前往進階版</a></p>

    <div id="quiz-container"></div>

    <button onclick="checkAnswers()">提交答案並查看解析</button>
    <div id="result"></div>
</div>

<script>
    const allQuestions = [
        // 原有 20 題
        { q: "在『重視網絡』要素中，我們的目的是什麼？", options: ["追求操控與吹捧", "彼此支接、分享資源，唯願基督得榮耀", "建立個人的名聲"], ans: 1, note: "來源：在網絡中不求操控，只願基督得榮耀。" },
        { q: "關於教會標記『大公的』(Catholic) 是指？", options: ["指某個特定宗派", "指普世的、不分地域文化且同屬基督的教會", "指公開給大眾參觀"], ans: 1, note: "來源：教會的大公性源於元首基督，涵蓋所有文化信徒。" },
        { q: "門徒群體的三個常態包括：常在浸禮中、常在主餐中，以及？", options: ["常在教堂內", "常在旅途上", "常在會議中"], ans: 1, note: "來源：門徒群體的常態是『永在旅途上』。" },
        { q: "『全民參與』旨在打破哪種傳統二分法？", options: ["富人與窮人", "聖職人員與平信徒", "男人與女人"], ans: 1, note: "來源：強調信徒皆祭司，所有人都在群體中服事。" },
        { q: "課程中提到，當代『堂會』常被誤認為什麼？", options: ["基督的身影", "提供服務的地方", "有機生命體"], ans: 1, note: "來源：受管理文化影響，堂會常被視為提供服務的有限公司。" },
        { q: "『聚焦基督』意味著我們應關心？", options: ["物業與行政", "弱勢群體、失喪靈魂與公義", "社交活動"], ans: 1, note: "來源：信徒群體應以基督之心為心，關懷邊緣者。" },
        { q: "耶穌呼召門徒，意思是要我們向祂學習什麼？", options: ["只是學習規條", "視祂為師傅、人生主導與導師", "學習經營組織"], ans: 1, note: "來源：門徒是跟隨耶穌學習祂的榜樣。" },
        { q: "『教會的任務』被比喻為誰的手指？", options: ["施洗約翰的手指", "摩西的手指", "保羅的手指"], ans: 0, note: "來源：像施洗約翰的手指一樣，見證並指向基督。" },
        { q: "根據以弗所書 2:10，門徒是上帝的什麼？", options: ["勞工", "工藝品 (Masterpiece)", "奴隸"], ans: 1, note: "來源：門徒是上帝的工藝品，在基督裡造成的。" },
        { q: "『外展繁殖』強調資源應該用在？", options: ["教堂建築裝修", "走出四面牆外向世界作見證", "增加會友福利"], ans: 1, note: "來源：教會本質是外向的，應被差遣到世界。" },
        { q: "『教會』(Ecclesia) 這個詞的原意是？", options: ["一棟建築", "被耶穌基督呼召出來的一群人", "慈善機構"], ans: 1, note: "來源：教會是一群被召出來的子民。" },
        { q: "真正的福音不應成為堂會營運的？", options: ["核心", "奴隸或傳銷手段", "好消息"], ans: 1, note: "來源：福音不應為堂會營運和發展所束縛。" },
        { q: "『相愛關係』在門徒群體中被視為？", options: ["核心目標與成就標記", "額外社交", "次要任務"], ans: 0, note: "來源：相愛關係是門徒群體追求的成就標記。" },
        { q: "『加力門訓』最重要的一環是？", options: ["發展標準教材", "發展『人』，建立生命", "發展行政"], ans: 1, note: "來源：門訓重點是建立人的生命。" },
        { q: "教會標記『傳承自使徒的』是指？", options: ["擁有古董", "遵行聖經原則與使徒見證", "由使徒親自建造"], ans: 1, note: "來源：指教會在真理、信仰和使命上傳承使徒見證。" },
        { q: "牧師與長執之間常有的矛盾是？", options: ["薪酬問題", "角色、功能與權責不清的內置矛盾", "停車位分配"], ans: 1, note: "來源：牧師與長執在角色與期望上若不釐清會產生內耗。" },
        { q: "教會標記『一體的』(One) 指？", options: ["全世界一個宗派", "全世界只有一個由基督連結的教會", "穿一樣制服"], ans: 1, note: "來源：基督的身體只有一個，所有信徒在主裡是一體。" },
        { q: "在『靈活架構』中，架構只是？", options: ["永久真理", "服事的工具", "炫耀實力"], ans: 1, note: "來源：架構是為了服事門徒建立，不應成為阻礙。" },
        { q: "『教徒』與『門徒』的分別？", options: ["教徒認信規條，門徒獻上生命", "沒有分別", "門徒比較有錢"], ans: 0, note: "來源：門徒是被基督擁有的生命。" },
        { q: "福音故事中的門徒群體生命狀態？", options: ["與主同死、同復活", "週末聚會", "各自修行"], ans: 0, note: "來源：生命與主連結，共同見證基督。" },
        
        // 新增 10 題
        { q: "根據課程總結，正確的次序應該是？", options: ["先有福音，後有教會", "先有教堂，後有福音", "先有規章，後有信徒"], ans: 0, note: "來源：先有福音，後有教會。" },
        { q: "根據彼得前書 2:9，信徒的身份是？", options: ["宗教消費者", "有君尊的祭司、聖潔的國度", "教堂的雇員"], ans: 1, note: "來源：惟有你們是被揀選的族類，是有君尊的祭司。" },
        { q: "教會的『聖潔性』來源於？", options: ["信徒的完美行為", "上帝的呼召與聖靈的工作", "嚴格的會規"], ans: 1, note: "來源：教會是由上帝呼召而來，聖潔是得於上帝的工作。" },
        { q: "『加力門訓』強調領袖應該發展為？", options: ["行政經理", "屬靈父母，建立下一代", "技術專家"], ans: 1, note: "來源：強調整個領袖袍要作屬靈父親，建立生命。" },
        { q: "發展『聚焦基督』的教會，不應該單靠什麼？", options: ["禱告與查經", "過去工作運作的經驗", "聖靈的引導"], ans: 1, note: "來源：堂會不應單靠過去工作運作的經驗來推動發展。" },
        { q: "『相愛關係』的實踐不應只在言詞上，更應在？", options: ["財力上", "行為和誠實上", "社交網絡上"], ans: 1, note: "來源：實踐深情厚愛不只是在言詞上，更在行為和誠實上。" },
        { q: "教會標記『傳承自使徒的』真諦在於？", options: ["追求古老儀式", "以基督為中心，遵守聖經原則", "由聖職人員統治"], ans: 1, note: "來源：其真諦在於遵守聖經原則，接受使徒見證。" },
        { q: "下列哪項是對於『教會』常見的誤解？", options: ["教會就是被召出來的人", "教會就是教舍或宗教聚會", "教會是基督的身影"], ans: 1, note: "來源：常見誤解以為教會就是教舍、宗派或宗教聚會。" },
        { q: "課程用什麼來比喻『靈活架構』？", options: ["堅固的堡壘", "能承載新酒的新皮袋", "精密的時鐘"], ans: 1, note: "來源：靈活架構類似新皮袋，能讓基督的國度拓展。" },
        { q: "教會除了是基督的身影，講義中還提到什麼形象？", options: ["待嫁的新娘", "提供服務的便利店", "大型連鎖企業"], ans: 0, note: "來源：教會的形象包含待嫁的新娘與上帝的殿堂。" }
    ];

    // 隨機抽選 10 題
    const selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 10);

    const container = document.getElementById('quiz-container');
    selectedQuestions.forEach((item, index) => {
        let optionsHTML = item.options.map((opt, i) => 
            `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`
        ).join('');
        container.innerHTML += `
            <div class="question">
                <p><strong>第 ${index + 1} 題：${item.q}</strong></p>
                <div class="options">${optionsHTML}</div>
            </div>
        `;
    });

    function checkAnswers() {
        let score = 0;
        let feedback = "【測驗解析與反思】\n\n";

        for (let i = 0; i < 10; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) {
                alert("請完成所有題目後再提交喔！");
                return;
            }
            if (parseInt(selected.value) === selectedQuestions[i].ans) {
                score++;
                feedback += `✅ 第 ${i+1} 題：正確！\n   💡 重點：${selectedQuestions[i].note}\n\n`;
            } else {
                feedback += `❌ 第 ${i+1} 題：答錯了。\n   💡 正確解析：${selectedQuestions[i].note}\n\n`;
            }
        }

        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerText = `得分：${score} / 10\n\n` + feedback;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
